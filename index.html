<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-container">
        <button type="button" class="header-home-btn" onclick="goHome()">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                fill="currentColor" viewBox="0 0 24 24" >
                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                <path d="M12.71 2.29a.996.996 0 0 0-1.41 0l-8.01 8A1 1 0 0 0 3 11v9c0 1.1.9 2 2 2h4c.55 0 1-.45 1-1v-6h4v6c0 .55.45 1 1 1h4c1.1 0 2-.9 2-2v-9c0-.27-.11-.52-.29-.71zM16 20v-5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v5H5v-8.59l7-7 7 7V20z"></path>
                </svg>
        </button>
        <form class="search-bar" action="search.html" method="GET">
            <input type="text" name="q" placeholder="Search books..." value="">
            <button>Search</button>
        </form>

        <nav class="tabs">
            <button data-section="read" class="nav-btn">
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                fill="currentColor" viewBox="0 0 24 24" >
                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                <path d="M21.55 3.69c-.28-.18-.64-.21-.95-.08-2.5 1.08-5.08.28-7.81-.56-2.96-.91-6.02-1.85-9.19-.48-.37.16-.6.52-.6.92v18.52h2V15.2c2.31-.73 4.69 0 7.21.77 1.89.58 3.81 1.17 5.78 1.17 1.12 0 2.26-.19 3.41-.69.37-.16.6-.52.6-.92V4.52c0-.34-.17-.65-.45-.84Zm-12.74.37c-.16-.03-.31-.06-.47-.08.16.02.31.05.47.08m7.41 10.89c.15.02.29.05.44.07-.15-.02-.29-.04-.44-.07m3.79-6.08c-1 .27-2 .31-3 .2v3c1 .1 2 .06 3-.2v2.96c-.98.31-1.98.34-3 .23v-2.98c-1-.1-2-.34-3-.62v2.96c-.4-.12-.8-.24-1.21-.36-.59-.18-1.19-.36-1.79-.53v-2.97c-1-.28-2-.52-3-.62v3c.05 0 .1.02.15.02-.38-.04-.76-.08-1.14-.08-.67 0-1.34.07-2.01.23v-2.97c1-.27 2-.31 3-.2v-3c-1-.1-2-.06-3 .2V4.18c.98-.31 1.98-.34 3-.23v2.98c1 .1 2 .34 3 .62V4.59c.4.12.8.24 1.21.36.59.18 1.19.37 1.79.53v2.96c1 .28 2 .52 3 .62V6.07c.99.09 1.99.06 3-.18v2.97Z"></path><path d="M11 7.55v3c1 .28 2 .62 3 .9v-3c-1-.28-2-.62-3-.9"></path>
                </svg>
                <span>Read</span>
            </button>
            <button data-section="plan" class="nav-btn">
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                    <path d="M18.5 2h-12C4.57 2 3 3.57 3 5.5V21c0 .35.18.67.47.85s.66.2.97.04l5.55-2.78 5.55 2.78a.997.997 0 0 0 1.45-.89v-8h4c.55 0 1-.45 1-1V5.5c0-1.93-1.57-3.5-3.5-3.5ZM15 19.38l-4.55-2.28a1 1 0 0 0-.89 0l-4.55 2.28V5.5c0-.83.67-1.5 1.5-1.5h8.85c-.22.46-.35.96-.35 1.5v13.88ZM20 11h-3V5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z"></path>
                    </svg>
                <span>Plan to Read</span>
                </button>
            <button data-section="reading" class="nav-btn">
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                    <path d="M21 3h-7c-.77 0-1.47.3-2 .78-.53-.48-1.23-.78-2-.78H3c-.55 0-1 .45-1 1v15c0 .55.45 1 1 1h5.76c.53 0 1.04.21 1.41.59l1.12 1.12s.02.01.03.02c.09.08.18.15.29.2.12.05.25.08.38.08s.26-.03.38-.08c.11-.05.21-.12.29-.2 0 0 .02-.01.03-.02l1.12-1.12c.37-.37.89-.59 1.41-.59h5.76c.55 0 1-.45 1-1V4c0-.55-.45-1-1-1ZM8.76 18H4V5h6c.55 0 1 .45 1 1v12.69c-.66-.44-1.44-.69-2.24-.69M20 18h-4.76c-.8 0-1.58.25-2.24.69V6c0-.55.45-1 1-1h6z"></path>
                    </svg>
                <span>Reading</span>
                </button>
        </nav>
    </div>
</header>

<main class="container">

<section class="featured">

    <h2 class="section-title">Featured Books</h2>
    <div id="featuredBooks" class="book-container scroll-row">

    </div>
</section>

<section class="recent">
    <h2 class="section-title">Recently Read</h2>
    <div id="recentBooks" class="scroll-row">

    </div>
</section>
<button type="button" class="home-btn" onclick="goHome()">
    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
        <path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1c.4 0 .77-.24.92-.62.15-.37.07-.8-.22-1.09l-8.99-9a.996.996 0 0 0-1.41 0l-9.01 9c-.29.29-.37.72-.22 1.09s.52.62.92.62Zm9-8.59 6 6V20H6v-9.59z"></path>
    </svg>
</button>
</main>

<script src="script.js"></script>

</body>
</html>
